name: advox_oms

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-advox_oms_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-advox_oms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - advox-oms-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/advox_oms_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://sprzedaz.advox.pl/advox-oms}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3300,http://localhost:5173,https://sprzedaz.advox.pl}
      NEXO_API_BASE_URL: ${NEXO_API_BASE_URL:-http://host.docker.internal:5085}
      NEXO_OPERATOR_LOGIN: ${NEXO_OPERATOR_LOGIN:-Szef firmy}
      NEXO_OPERATOR_PASSWORD: ${NEXO_OPERATOR_PASSWORD:-robocze}
      PRESTASHOP_URL: ${PRESTASHOP_URL:-}
      PRESTASHOP_API_KEY: ${PRESTASHOP_API_KEY:-}
      BASELINKER_URL: ${BASELINKER_URL:-https://api.baselinker.com/connector.php}
      BASELINKER_API_KEY: ${BASELINKER_API_KEY:-}
      WOOCOMMERCE_URL: ${WOOCOMMERCE_URL:-https://host.docker.internal:8888/wp-json/wc/v3}
      WOOCOMMERCE_CONSUMER_KEY: ${WOOCOMMERCE_CONSUMER_KEY:-}
      WOOCOMMERCE_CONSUMER_SECRET: ${WOOCOMMERCE_CONSUMER_SECRET:-}
      WOOCOMMERCE_VERIFY_SSL: ${WOOCOMMERCE_VERIFY_SSL:-false}
      SHOPIFY_URL: ${SHOPIFY_URL:-}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN:-}
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-}
      SHOPIFY_VERIFY_SSL: ${SHOPIFY_VERIFY_SSL:-true}
      MAGENTO_URL: ${MAGENTO_URL:-https://host.docker.internal:8444/rest}
      MAGENTO_CONSUMER_KEY: ${MAGENTO_CONSUMER_KEY:-}
      MAGENTO_CONSUMER_SECRET: ${MAGENTO_CONSUMER_SECRET:-}
      MAGENTO_ACCESS_TOKEN: ${MAGENTO_ACCESS_TOKEN:-}
      MAGENTO_ACCESS_TOKEN_SECRET: ${MAGENTO_ACCESS_TOKEN_SECRET:-}
      MAGENTO_VERIFY_SSL: ${MAGENTO_VERIFY_SSL:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    networks:
      advox-oms-network:
      proxy:
        aliases:
          - advox-oms-backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/advox-oms/}
    restart: unless-stopped
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH:-/advox-oms}
    ports:
      - "3300:80"
    depends_on:
      - backend
    networks:
      advox-oms-network:
      proxy:
        aliases:
          - advox-oms-frontend

volumes:
  postgres_data:
    name: advox_oms_postgres_data
    driver: local

networks:
  advox-oms-network:
    name: advox_oms_network
    driver: bridge
  proxy:
    external: true
